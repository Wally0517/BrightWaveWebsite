<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | BrightWave Habitat Enterprise</title>
  <link rel="icon" href="/assets/images/brightwave-logo.png" />
  <link rel="canonical" href="https://www.brightwavehabitat.com/" />
  <meta name="robots" content="noindex,follow" />
  <meta http-equiv="refresh" content="0; url=/#contact" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
  </style>
</head>
<body>
  <main class="surface-panel rounded-[2rem] p-8 md:p-10 max-w-2xl w-full text-center">
    <p class="section-kicker mb-3">Redirecting</p>
    <h1 class="brand-display text-4xl md:text-5xl font-semibold mb-5">Taking you to <span class="gradient-text">BrightWave contact</span>.</h1>
    <p class="text-slate-300 leading-8 max-w-xl mx-auto mb-8">The main contact experience lives on the homepage so all enquiries stay in one place. Your destination is loading now.</p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-xl mx-auto">
      <a id="fallback" href="/#contact" class="brand-button">
        <i class="fas fa-paper-plane"></i>
        <span>Go to contact</span>
      </a>
      <a href="/" class="brand-button-secondary">
        <i class="fas fa-home"></i>
        <span>Back to homepage</span>
      </a>
    </div>
  </main>

  <script>
    const qs = window.location.search || '';
    const target = `/${qs}#contact`;
    document.getElementById('fallback').href = target;
    window.location.replace(target);
  </script>
</body>
</html>
