<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Brightwave Habitat</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a2540; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 24px; }
    h1 { font-size: 22px; margin: 16px 0 8px; }
    p { opacity: 0.8; margin: 4px 0; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <h1>Brightwave Habitat</h1>
    <p>Loading…</p>
  </div>
  <script>
    setTimeout(function () { window.location.replace("https://www.brightwavehabitat.com"); }, 600);
  </script>
</body>
</html>
